<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Nanogram v0.9.0 — группы, файлы, приватность</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* ===== ТЁМНАЯ ТЕМА (ИСПРАВЛЕННАЯ) ===== */
        :root {
            --bg-primary: #0a0c10;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #ffffff;
            --text-secondary: #b0b3b8;
            --text-muted: #8b949e;
            --accent: #9f8be5;
            --accent-hover: #b09cff;
            --accent-light: rgba(159, 139, 229, 0.2);
            --border: #30363d;
            --hover: #2d333b;
            --message-sent: #9f8be5;
            --message-received: #2d333b;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            --premium-gold: #ffd700;
            --creator-purple: #8a2be2;
            --success-green: #2ea043;
            --danger-red: #da3633;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px;
            height: 100vh;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* ===== СВЕТЛАЯ ТЕМА ===== */
        body.light-theme {
            --bg-primary: #f6f8fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f2f5;
            --text-primary: #24292f;
            --text-secondary: #57606a;
            --text-muted: #6e7781;
            --accent: #9f8be5;
            --accent-hover: #b09cff;
            --border: #d0d7de;
            --hover: #eaeef2;
            --message-sent: #9f8be5;
            --message-received: #eaeef2;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        /* ===== МАТОВЫЙ ЭФФЕКТ ===== */
        .app-container, .chats-panel, .chat-panel, .modal, .login-card, 
        .panel-header, .profile-section, .chat-item, .message-input-area,
        .chat-header, .tab, .icon-btn, .donation-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        /* ===== АНИМАЦИИ ===== */
        .chat-item, .icon-btn, .tab, .send-btn, .message {
            transition: all 0.3s ease;
        }

        .chat-item:hover {
            transform: translateX(5px) scale(1.01);
            background: var(--hover);
            border-color: var(--accent);
        }

        .icon-btn:hover {
            transform: scale(1.1) rotate(5deg);
            background: var(--accent);
            color: white;
        }

        /* ===== ОСНОВНОЙ КОНТЕЙНЕР ===== */
        .app-container {
            width: 100%;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .chats-panel {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: transform 0.3s ease;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            border-right: 1px solid var(--border);
        }

        .chats-panel.hidden {
            transform: translateX(-100%);
        }

        .chat-panel {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
            transition: transform 0.3s ease;
        }

        .chat-panel.hidden {
            transform: translateX(100%);
        }

        @media (min-width: 769px) {
            .chats-panel {
                position: relative;
                width: 350px;
                transform: none !important;
            }
            .chat-panel {
                position: relative;
                width: calc(100% - 350px);
                transform: none !important;
            }
            .app-container {
                flex-direction: row;
            }
            .mobile-back-btn {
                display: none !important;
            }
        }

        @media (min-width: 1200px) {
            .chats-panel {
                width: 400px;
            }
        }

        /* ===== ШАПКА ===== */
        .panel-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .panel-header h2 {
            font-size: 26px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-primary);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .mobile-back-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            cursor: pointer;
            margin-right: 12px;
        }

        /* ===== СТАТУС СОЕДИНЕНИЯ ===== */
        .connection-status {
            padding: 6px 16px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2ea043;
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected {
            background: #da3633;
            animation: none;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* ===== БЕЙДЖИ ===== */
        .creator-badge {
            background: linear-gradient(135deg, var(--creator-purple), #9370db);
            color: white;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            white-space: nowrap;
        }

        .premium-badge {
            background: linear-gradient(135deg, var(--premium-gold), #ffa500);
            color: #000;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
        }

        /* ===== DONATION КНОПКА ===== */
        .donation-btn {
            background: linear-gradient(135deg, var(--premium-gold), #ffa500);
            color: #000;
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: calc(100% - 32px);
            margin: 10px 16px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .donation-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }
                /* ===== ПРОФИЛЬ ===== */
        .profile-section {
            padding: 14px 18px;
            margin: 12px 16px;
            border-radius: 20px;
            background: var(--bg-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .profile-section:hover {
            transform: scale(1.01);
            background: var(--hover);
            border-color: var(--accent);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: white;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info {
            flex: 1;
            min-width: 0;
        }

        .profile-name {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 4px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-status {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .badge-container {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        /* ===== ПОИСК ===== */
        .search-box {
            padding: 10px 18px;
            margin: 0 16px 16px;
            border-radius: 40px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
        }

        .search-box i {
            color: var(--text-secondary);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 15px;
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        /* ===== ТАБЫ (НОВЫЕ) ===== */
        .tabs {
            display: flex;
            padding: 0 16px;
            gap: 10px;
            margin-bottom: 16px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            flex: 1;
            min-width: 70px;
            padding: 10px 0;
            border-radius: 30px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab:hover {
            transform: translateY(-2px);
            background: var(--hover);
            border-color: var(--accent);
        }

        .tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .tab i {
            margin-right: 6px;
        }

        /* ===== СПИСОК ЧАТОВ/ГРУПП ===== */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            margin: 6px 0;
            border-radius: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .chat-item.selected {
            background: var(--accent);
            border-color: var(--accent);
        }

        .chat-item.selected .chat-name,
        .chat-item.selected .chat-preview {
            color: white;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chat-preview {
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--accent);
            color: white;
            margin-left: 10px;
            white-space: nowrap;
        }

        .group-badge {
            background: var(--creator-purple);
        }

        .premium-icon {
            color: var(--premium-gold);
            font-size: 14px;
            margin-left: 5px;
        }

        .creator-icon {
            color: var(--creator-purple);
            font-size: 14px;
            margin-left: 5px;
        }

        /* ===== ПРАВАЯ ПАНЕЛЬ ЧАТА ===== */
        .chat-header {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .chat-header-info {
            flex: 1;
            min-width: 0;
        }

        .chat-header-info h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .chat-header-info p {
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .online-status {
            color: #2ea043;
            font-size: 12px;
        }

        .offline-status {
            color: #8b949e;
            font-size: 12px;
        }

        .typing-indicator {
            font-size: 13px;
            color: var(--accent);
            font-style: italic;
            animation: blink 1.5s infinite;
            margin-top: 4px;
        }

        @keyframes blink {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* ===== СООБЩЕНИЯ ===== */
        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
        }

        .message {
            max-width: 75%;
            margin-bottom: 12px;
            padding: 12px 18px;
            border-radius: 22px;
            position: relative;
            animation: slideIn 0.3s ease;
            word-wrap: break-word;
            line-height: 1.4;
            border: 1px solid var(--border);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
            background: var(--message-sent);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message.received {
            align-self: flex-start;
            background: var(--message-received);
            color: var(--text-primary);
            border-bottom-left-radius: 6px;
        }

        .message-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 6px;
            font-size: 11px;
            opacity: 0.7;
        }

        .status-icon.delivered { color: var(--accent); }
        .status-icon.read { color: var(--success-green); }

        .file-message {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-tertiary);
            padding: 8px 12px;
            border-radius: 12px;
            margin-top: 5px;
        }

        .file-icon {
            font-size: 24px;
            color: var(--accent);
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            font-size: 14px;
        }

        .file-size {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .voice-message {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-tertiary);
            padding: 8px 12px;
            border-radius: 20px;
            margin-top: 5px;
        }

        .youtube-preview {
            background: var(--bg-tertiary);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 5px;
            cursor: pointer;
        }

        .youtube-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 48px;
        }

        .youtube-title {
            padding: 8px 12px;
            font-weight: 600;
        }        /* ===== ПОЛЕ ВВОДА ===== */
        .message-input-area {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .attach-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .attach-btn:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.1);
        }

        .message-input-area input {
            flex: 1;
            padding: 14px 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 40px;
            outline: none;
            color: var(--text-primary);
            font-size: 15px;
        }

        .message-input-area input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.1);
            background: var(--accent-hover);
        }

        /* ===== МОДАЛЬНЫЕ ОКНА ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
        }

        .modal-overlay.active {
            display: block;
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 30px;
            border-radius: 30px;
            z-index: 1001;
            display: none;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .modal.active {
            display: block;
        }

        .modal h2 {
            margin-bottom: 20px;
            color: var(--accent);
            font-size: 26px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal input, .modal textarea, .modal select {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-primary);
            margin-bottom: 16px;
            outline: none;
            font-size: 15px;
        }

        .modal input:focus, .modal textarea:focus, .modal select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .modal button {
            padding: 14px 28px;
            background: var(--accent);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-right: 12px;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .modal button:hover {
            background: var(--accent-hover);
            transform: scale(1.03);
        }

        .modal .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            font-size: 20px;
        }

        .modal .close-btn:hover {
            background: var(--accent);
            color: white;
            transform: rotate(90deg);
        }

        /* ===== МОДАЛКА ПРИВАТНОСТИ ===== */
        .privacy-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .privacy-option label {
            color: var(--text-primary);
            font-weight: 600;
        }

        .privacy-option select {
            width: 150px;
            margin: 0;
        }

        /* ===== МОДАЛКА БЛОКИРОВОК ===== */
        .blocked-user {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .blocked-user button {
            padding: 6px 12px;
            background: var(--danger-red);
            font-size: 13px;
        }

        /* ===== МОДАЛКА ЗАГРУЗКИ ФАЙЛА ===== */
        .file-preview {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
        }

        .file-preview i {
            font-size: 48px;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
            margin: 16px 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }
                /* ===== СТРАНИЦА ВХОДА ===== */
        .login-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-primary);
        }

        .login-card {
            padding: 50px 40px;
            border-radius: 50px;
            width: 420px;
            text-align: center;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
        }

        .login-card h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .login-card p {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 16px;
        }

        .login-input {
            width: 100%;
            padding: 16px 22px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 40px;
            color: var(--text-primary);
            font-size: 16px;
            margin: 10px 0;
            outline: none;
        }

        .login-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 20px 0;
        }

        .login-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            justify-content: center;
            color: var(--text-secondary);
        }

        .checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);

        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;

        .theme-toggle:hover {

        /* ===== СКРОЛЛБАР ===== */
        ::-webkit-scrollbar {

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-light);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {

        }
    </style>
</head>
<body>
    <div class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-sun"></i> <span>Сменить тему</span>
    </div>

    <!-- МОДАЛКИ -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeAllModals()"></div>
    
    <!-- Модалка профиля -->
    <div class="modal" id="profileModal">
        <button class="close-btn" onclick="closeAllModals()"><i class="fas fa-times"></i></button>
        <h2><i class="fas fa-user-circle"></i> Профиль</h2>
        
        <div class="profile-edit">
            <div class="avatar" id="modalAvatar" onclick="document.getElementById('avatarInput').click()">👤</div>
            <input type="file" id="avatarInput" accept="image/*" style="display: none;">
            <p style="color: var(--text-secondary);">Нажми на аватарку</p>
        </div>
        
        <input type="text" id="profileName" placeholder="Имя" value="">
        <textarea id="profileBio" placeholder="О себе" rows="3"></textarea>
        
        <button onclick="saveProfile()">💾 Сохранить</button>
        <button onclick="closeAllModals()" style="background: transparent; color: var(--text-primary);">Отмена</button>
    </div>
    
    <!-- Модалка приватности -->
    <div class="modal" id="privacyModal">
        <button class="close-btn" onclick="closeAllModals()"><i class="fas fa-times"></i></button>
        <h2><i class="fas fa-lock"></i> Приватность</h2>
        
        <div class="privacy-option">
            <label>Кто видит номер</label>
            <select id="privacyPhone">
                <option value="all">Все</option>
                <option value="contacts">Контакты</option>
                <option value="none">Никто</option>
            </select>
        </div>
        
        <div class="privacy-option">
            <label>Кто видит онлайн</label>
            <select id="privacyOnline">
                <option value="all">Все</option>
                <option value="contacts">Контакты</option>
                <option value="none">Никто</option>
            </select>
        </div>
        
        <button onclick="savePrivacy()">💾 Сохранить</button>
        <button onclick="closeAllModals()" style="background: transparent;">Отмена</button>
    </div>
    
    <!-- Модалка блокировок -->
    <div class="modal" id="blockModal">
        <button class="close-btn" onclick="closeAllModals()"><i class="fas fa-times"></i></button>
        <h2><i class="fas fa-ban"></i> Блокировки</h2>
        
        <div id="blockedList"></div>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <input type="text" id="blockUsername" placeholder="Имя пользователя">
            <button onclick="blockUser()">🔨 Заблокировать</button>
        </div>
    </div>
    
    <!-- Модалка создания группы -->
    <div class="modal" id="createGroupModal">
        <button class="close-btn" onclick="closeAllModals()"><i class="fas fa-times"></i></button>
        <h2><i class="fas fa-users"></i> Создать группу</h2>
        <input type="text" id="groupName" placeholder="Название группы">
        <button onclick="createGroup()">✅ Создать</button>
        <button onclick="closeAllModals()" style="background: transparent;">Отмена</button>
    </div>
    
    <!-- Модалка добавления в группу -->
    <div class="modal" id="addToGroupModal">
        <button class="close-btn" onclick="closeAllModals()"><i class="fas fa-times"></i></button>
        <h2><i class="fas fa-user-plus"></i> Добавить в группу</h2>
        <input type="text" id="addUserToGroup" placeholder="Имя пользователя">
        <button onclick="addToGroup()">✅ Добавить</button>
        <button onclick="closeAllModals()" style="background: transparent;">Отмена</button>
    </div>
    
    <!-- Модалка отправки файла -->
    <div class="modal" id="fileModal">
        <button class="close-btn" onclick="closeAllModals()"><i class="fas fa-times"></i></button>
        <h2><i class="fas fa-file"></i> Отправить файл</h2>
        
        <div class="file-preview" id="filePreview">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Выберите файл</p>
        </div>
        
        <input type="file" id="fileInput" style="display: none;">
        <button onclick="document.getElementById('fileInput').click()">📁 Выбрать файл</button>
        
        <div class="progress-bar" id="progressBar" style="display: none;">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <button onclick="sendFile()" id="sendFileBtn" disabled>📤 Отправить</button>
    </div>
    
    <!-- Модалка YouTube -->
    <div class="modal" id="youtubeModal">
        <button class="close-btn" onclick="closeAllModals()"><i class="fas fa-times"></i></button>
        <h2><i class="fab fa-youtube"></i> Поделиться видео</h2>
        <input type="text" id="youtubeLink" placeholder="Ссылка на YouTube">
        <button onclick="shareYoutube()">📤 Отправить</button>
        <button onclick="closeAllModals()" style="background: transparent;">Отмена</button>
    </div>
        <!-- СТРАНИЦА ВХОДА -->
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <h1>🧪 Nanogram</h1>
            <p>v0.9.0 — группы, файлы, приватность</p>
            
            <input type="text" id="loginUsername" class="login-input" placeholder="Имя пользователя" autofocus>
            <input type="tel" id="loginPhone" class="login-input" placeholder="Номер телефона">
            <input type="password" id="loginPassword" class="login-input" placeholder="Пароль">
            
            <div class="checkbox">
                <input type="checkbox" id="privacyAgree">
                <label>Я принимаю</label>
                <span class="privacy-link" onclick="window.open('/privacy', '_blank')">Политику</span>
            </div>
            
            <button class="login-btn" onclick="register()">🚀 Войти</button>
            
            <div style="margin-top: 20px; font-size: 12px;">
                <span class="privacy-link" onclick="openDonateModal()">💰 Донаты</span>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="appPage" class="app-container" style="display: none;">
        <!-- ЛЕВАЯ ПАНЕЛЬ -->
        <div class="chats-panel" id="chatsPanel">
            <div class="panel-header">
                <h2>🧪 <span>Nanogram</span></h2>
                <div class="header-buttons">
                    <button class="icon-btn" onclick="openCreateMenu()"><i class="fas fa-plus"></i></button>
                </div>
            </div>
            
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Подключение...</span>
                <span id="latency" style="margin-left: auto;">0ms</span>
            </div>
            
            <!-- Профиль -->
            <div class="profile-section" onclick="openProfileMenu()">
                <div class="profile-header">
                    <div class="avatar" id="headerAvatar">👤</div>
                    <div class="profile-info">
                        <div class="profile-name" id="headerName">
                            <span id="headerNameText"></span>
                            <span id="premiumIcon" style="display: none;"><i class="fas fa-crown premium-icon"></i></span>
                            <span id="creatorIcon" style="display: none;"><i class="fas fa-star creator-icon"></i></span>
                        </div>
                        <div class="profile-status" id="headerStatus">🟢 Онлайн</div>
                    </div>
                </div>
            </div>
            
            <button class="donation-btn" onclick="openDonateModal()">
                <i class="fas fa-heart"></i> Поддержать проект
            </button>
            
            <!-- Поиск -->
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск...">
            </div>
            
            <!-- ТАБЫ (НОВЫЕ) -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('chats')"><i class="fas fa-user"></i> <span>Чаты</span></button>
                <button class="tab" onclick="switchTab('groups')"><i class="fas fa-users"></i> <span>Группы</span></button>
                <button class="tab" onclick="switchTab('channels')"><i class="fas fa-bullhorn"></i> <span>Каналы</span></button>
                <button class="tab" onclick="switchTab('rooms')"><i class="fas fa-lock"></i> <span>Комнаты</span></button>
            </div>
            
            <!-- Список -->
            <div class="chats-list" id="chatsList"></div>
            
            <button class="tab" onclick="openJoinModal()" style="margin: 16px;">
                <i class="fas fa-link"></i> Присоединиться
            </button>
        </div>
        
        <!-- ПРАВАЯ ПАНЕЛЬ -->
        <div class="chat-panel hidden" id="chatPanel">
            <div class="chat-header">
                <button class="mobile-back-btn" onclick="hideChatPanel()"><i class="fas fa-arrow-left"></i></button>
                <div class="chat-header-info">
                    <h3 id="currentChatName">Выберите чат</h3>
                    <p id="currentChatInfo"></p>
                    <div id="typingIndicator" class="typing-indicator" style="display: none;"></div>
                </div>
            </div>
            
            <div class="messages-container" id="messagesContainer"></div>
            
            <div class="message-input-area">
                <button class="attach-btn" onclick="openAttachMenu()"><i class="fas fa-paperclip"></i></button>
                <input type="text" id="messageInput" placeholder="Сообщение..." disabled>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==============================================
        // КОНСТАНТЫ
        // ==============================================
        const CREATOR_USERNAME = 'Dane4ka5';
        const VERSION = 'v0.9.0';
        
        // ==============================================
        // ГЛОБАЛЬНЫЕ
        // ==============================================
        let socket = null;
        let currentUser = null;
        let currentPhone = null;
        let currentChat = null;
        let currentChatType = null;
        let users = [];
        let groups = [];
        let channels = [];
        let rooms = [];
        let messages = {};
        let userProfile = {};
        let isPremium = false;
        let isCreator = false;
        let typingTimeout = null;
        let reconnectAttempts = 0;
        let pingInterval = null;
        let blockedUsers = [];
        let privacySettings = { showPhone: 'all', showOnline: 'all' };
        let currentGroupId = null;

        // ==============================================
        // ТЕМА
        // ==============================================
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        // ==============================================
        // МЕНЮ ПРОФИЛЯ
        // ==============================================
        function openProfileMenu() {
            const menu = confirm('Профиль:\nOK - редактировать\nОтмена - приватность');
            if (menu) {
                openProfileModal();
            } else {
                openPrivacyModal();
            }
        }

        // ==============================================
        // МОДАЛКИ
        // ==============================================
        function openModal(id) {
            document.getElementById(id).classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeAllModals() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function openCreateMenu() {
            const choice = confirm('Создать:\nOK - группу\nОтмена - канал');
            if (choice) {
                openModal('createGroupModal');
            } else {
                openModal('createChannelModal');
            }
        }

        function openAttachMenu() {
            const choice = confirm('Отправить:\nOK - файл\nОтмена - YouTube');
            if (choice) {
                openModal('fileModal');
            } else {
                openModal('youtubeModal');
            }
        }

        function openProfileModal() {
            document.getElementById('profileName').value = currentUser;
            document.getElementById('profileBio').value = userProfile.bio || '';
            openModal('profileModal');
        }

        function openPrivacyModal() {
            document.getElementById('privacyPhone').value = privacySettings.showPhone;
            document.getElementById('privacyOnline').value = privacySettings.showOnline;
            openModal('privacyModal');
        }

        function openBlockModal() {
            updateBlockedList();
            openModal('blockModal');
        }

        function updateBlockedList() {
            const list = document.getElementById('blockedList');
            list.innerHTML = '';
            blockedUsers.forEach(user => {
                list.innerHTML += `
                    <div class="blocked-user">
                        <span>${user}</span>
                        <button onclick="unblockUser('${user}')">Разблокировать</button>
                    </div>
                `;
            });
        }

        // ==============================================
        // РЕГИСТРАЦИЯ
        // ==============================================
        function register() {
            const username = document.getElementById('loginUsername').value.trim();
            const phone = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (!username || !phone || !password) {
                alert('❌ Заполните все поля');
                return;
            }
            
            if (!document.getElementById('privacyAgree').checked) {
                alert('❌ Примите политику');
                return;
            }
            
            currentUser = username;
            currentPhone = phone;
            localStorage.setItem('nanogram_user', username);
            localStorage.setItem('nanogram_phone', phone);
            
            connectWebSocket(password);
        }

        // ==============================================
        // WEBSOCKET
        // ==============================================
        function connectWebSocket(password) {
            socket = new WebSocket('wss://minegram.onrender.com');
            
            socket.onopen = function() {
                console.log('✅ Подключено');
                document.getElementById('statusDot').className = 'status-dot';
                document.getElementById('statusText').textContent = 'Онлайн';
                
                socket.send(JSON.stringify({
                    type: 'register',
                    username: currentUser,
                    password: password,
                    phone: currentPhone,
                    privacyAccepted: true
                }));
                
                pingInterval = setInterval(() => {
                    socket.send(JSON.stringify({ type: 'ping', timestamp: Date.now() }));
                }, 5000);
            };
            
            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.type === 'pong') {
                    document.getElementById('latency').textContent = (Date.now() - data.timestamp) + 'ms';
                    return;
                }
                
                console.log('📩', data.type);
                
                if (data.type === 'login_success' || data.type === 'register_success') {
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('appPage').style.display = 'flex';
                    document.getElementById('headerNameText').textContent = currentUser;
                    
                    if (currentUser === CREATOR_USERNAME) {
                        isCreator = true;
                        document.getElementById('creatorIcon').style.display = 'inline';
                    }
                    
                    if (data.premium || isCreator) {
                        isPremium = true;
                        document.getElementById('premiumIcon').style.display = 'inline';
                    }
                    
                    if (data.privacy) {
                        privacySettings = data.privacy;
                    }
                    
                    if (data.blocked) {
                        blockedUsers = data.blocked;
                    }
                    
                    if (data.profile) {
                        userProfile = data.profile;
                        if (userProfile.avatar) {
                            document.getElementById('headerAvatar').innerHTML = `<img src="${userProfile.avatar}">`;
                        }
                    }
                }
                
                if (data.type === 'history') messages = data.history || {};
                if (data.type === 'user_list') users = data.users || [];
                if (data.type === 'groups_list') groups = data.groups || [];
                if (data.type === 'channels_list') channels = data.channels || [];
                if (data.type === 'rooms_list') rooms = data.rooms || [];
                
                if (data.type === 'new_group') {
                    groups.push(data.group);
                    if (document.querySelector('.tab.active').innerText.includes('Группы')) {
                        updateChatsList('groups');
                    }
                }
                
                if (data.type === 'group_created') {
                    groups.push(data.group);
                    updateChatsList('groups');
                    selectChat('group', data.group.name, data.group);
                }
                
                if (data.type === 'group_message') {
                    if (data.groupId === currentChat) {
                        displayMessage({
                            text: data.text,
                            from: data.from,
                            time: data.time,
                            type: data.from === currentUser ? 'sent' : 'received'
                        });
                    }
                }
                
                if (data.type === 'message') {
                    if (data.from === currentChat) {
                        displayMessage({
                            text: data.text,
                            from: data.from,
                            time: data.time,
                            type: 'received'
                        });
                    }
                }
                
                if (data.type === 'file') {
                    if (data.from === currentChat) {
                        displayFileMessage(data);
                    }
                }
                
                if (data.type === 'voice') {
                    if (data.from === currentChat) {
                        displayVoiceMessage(data);
                    }
                }
                
                if (data.type === 'youtube') {
                    if (data.from === currentChat) {
                        displayYoutubeMessage(data);
                    }
                }
                
                if (data.type === 'typing') {
                    if (data.from === currentChat) {
                        document.getElementById('typingIndicator').style.display = 'block';
                        document.getElementById('typingIndicator').textContent = `${data.from} печатает...`;
                        clearTimeout(typingTimeout);
                        typingTimeout = setTimeout(() => {
                            document.getElementById('typingIndicator').style.display = 'none';
                        }, 2000);
                    }
                }
                
                if (data.type === 'read') {
                    const msg = document.querySelector(`[data-id="${data.messageId}"] .status-icon`);
                    if (msg) {
                        msg.className = 'status-icon read';
                        msg.innerHTML = '<i class="fas fa-check-double"></i>';
                    }
                }
                
                if (data.type === 'privacy_updated') {
                    privacySettings = data.settings;
                    alert('✅ Настройки приватности сохранены');
                }
                
                if (data.type === 'blocked_list') {
                    blockedUsers = data.blocked;
                    updateBlockedList();
                }
                
                updateChatsList('chats');
            };
            
            socket.onclose = function() {
                document.getElementById('statusDot').className = 'status-dot disconnected';
                document.getElementById('statusText').textContent = 'Офлайн';
                clearInterval(pingInterval);
                
                if (reconnectAttempts < 5) {
                    reconnectAttempts++;
                    setTimeout(() => connectWebSocket(password), 3000);
                }
            };
        }

        // ==============================================
        // ОБНОВЛЕНИЕ СПИСКОВ
        // ==============================================
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.closest('.tab').classList.add('active');
            updateChatsList(tab);
        }

        function updateChatsList(tab) {
            const list = document.getElementById('chatsList');
            list.innerHTML = '';
            
            if (tab === 'chats') {
                users.filter(u => u !== currentUser && !blockedUsers.includes(u)).forEach(user => {
                    list.appendChild(createChatItem('user', user, '👤'));
                });
            } else if (tab === 'groups') {
                groups.forEach(group => {
                    list.appendChild(createChatItem('group', group.name, '👥', group));
                });
            } else if (tab === 'channels') {
                channels.forEach(channel => {
                    list.appendChild(createChatItem('channel', channel.name, '📢', channel));
                });
            } else if (tab === 'rooms') {
                rooms.forEach(room => {
                    list.appendChild(createChatItem('room', room.name, '🔒', room));
                });
            }
        }

        function createChatItem(type, name, icon, data = null) {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.onclick = () => selectChat(type, name, data);
            
            let badge = '';
            if (type === 'group') badge = '<span class="chat-badge group-badge">👥</span>';
            else if (type === 'channel') badge = '<span class="chat-badge">📢</span>';
            else if (type === 'room') badge = '<span class="chat-badge">🔒</span>';
            
            div.innerHTML = `
                <div class="chat-avatar">${icon}</div>
                <div class="chat-info">
                    <div class="chat-name">${name}</div>
                    <div class="chat-preview">${type}</div>
                </div>
                ${badge}
            `;
            
            return div;
        }

        // ==============================================
        // ВЫБОР ЧАТА
        // ==============================================
        function selectChat(type, name, data = null) {
            currentChat = name;
            currentChatType = type;
            if (type === 'group') currentGroupId = data?.id;
            
            document.getElementById('currentChatName').textContent = name;
            document.getElementById('messagesContainer').innerHTML = '';
            
            if (type === 'channel') {
                document.getElementById('messageInput').disabled = true;
                document.getElementById('sendBtn').disabled = true;
            } else {
                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
            }
            
            // Загрузка истории
            if (type === 'group' && data?.messages) {
                data.messages.forEach(msg => {
                    displayMessage({
                        text: msg.text,
                        from: msg.from,
                        time: msg.time,
                        type: msg.from === currentUser ? 'sent' : 'received'
                    });
                });
            } else {
                const chatKey = [currentUser, name].sort().join('_');
                if (messages[chatKey]) {
                    messages[chatKey].forEach(msg => {
                        if (msg.type === 'file') displayFileMessage(msg);
                        else if (msg.type === 'voice') displayVoiceMessage(msg);
                        else if (msg.type === 'youtube') displayYoutubeMessage(msg);
                        else {
                            displayMessage({
                                text: msg.text,
                                from: msg.from,
                                time: msg.time,
                                type: msg.from === currentUser ? 'sent' : 'received'
                            });
                        }
                    });
                }
            }
            
            if (window.innerWidth <= 768) showChatPanel();
        }

        // ==============================================
        // ОТПРАВКА СООБЩЕНИЯ
        // ==============================================
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const time = new Date().toLocaleTimeString();
            
            if (currentChatType === 'group') {
                socket.send(JSON.stringify({
                    type: 'group_message',
                    groupId: currentGroupId,
                    from: currentUser,
                    text,
                    time
                }));
            } else {
                socket.send(JSON.stringify({
                    type: 'message',
                    to: currentChat,
                    from: currentUser,
                    text,
                    time
                }));
            }
            
            displayMessage({ text, from: currentUser, time, type: 'sent' });
            input.value = '';
            
            socket.send(JSON.stringify({ type: 'typing', from: currentUser, to: currentChat }));
        }

        function displayMessage(msg) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = `message ${msg.type}`;
            div.innerHTML = `
                ${msg.text}
                <div class="message-footer">
                    ${msg.time}
                    ${msg.type === 'sent' ? '<span class="status-icon"><i class="fas fa-check"></i></span>' : ''}
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function displayFileMessage(msg) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = `message ${msg.from === currentUser ? 'sent' : 'received'}`;
            div.innerHTML = `
                <div class="file-message">
                    <i class="fas fa-file file-icon"></i>
                    <div class="file-info">
                        <div class="file-name">${msg.fileName}</div>
                        <div class="file-size">${(msg.fileSize / 1024).toFixed(2)} KB</div>
                    </div>
                </div>
                <div class="message-footer">${msg.time}</div>
            `;
            container.appendChild(div);
        }

        function displayVoiceMessage(msg) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = `message ${msg.from === currentUser ? 'sent' : 'received'}`;
            div.innerHTML = `
                <div class="voice-message">
                    <i class="fas fa-microphone"></i>
                    <span>🎤 Голосовое (${msg.duration}s)</span>
                </div>
                <div class="message-footer">${msg.time}</div>
            `;
            container.appendChild(div);
        }

        function displayYoutubeMessage(msg) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = `message ${msg.from === currentUser ? 'sent' : 'received'}`;
            div.innerHTML = `
                <div class="youtube-preview" onclick="window.open('https://youtube.com/watch?v=${msg.videoId}')">
                    <div class="youtube-thumb">
                        <i class="fab fa-youtube"></i>
                    </div>
                    <div class="youtube-title">${msg.title || 'YouTube Video'}</div>
                </div>
                <div class="message-footer">${msg.time}</div>
            `;
            container.appendChild(div);
        }

        // ==============================================
        // ГРУППЫ
        // ==============================================
        function createGroup() {
            const name = document.getElementById('groupName').value.trim();
            if (!name) return alert('Введите название');
            
            socket.send(JSON.stringify({
                type: 'create_group',
                name,
                creator: currentUser
            }));
            
            closeAllModals();
            document.getElementById('groupName').value = '';
        }

        function addToGroup() {
            const username = document.getElementById('addUserToGroup').value.trim();
            if (!username || !currentGroupId) return;
            
            socket.send(JSON.stringify({
                type: 'add_to_group',
                groupId: currentGroupId,
                username,
                adder: currentUser
            }));
            
            closeAllModals();
        }

        // ==============================================
        // ПРИВАТНОСТЬ
        // ==============================================
        function savePrivacy() {
            const settings = {
                showPhone: document.getElementById('privacyPhone').value,
                showOnline: document.getElementById('privacyOnline').value
            };
            
            socket.send(JSON.stringify({
                type: 'update_privacy',
                username: currentUser,
                settings
            }));
            
            privacySettings = settings;
            closeAllModals();
        }

        function blockUser() {
            const username = document.getElementById('blockUsername').value.trim();
            if (!username) return;
            
            socket.send(JSON.stringify({
                type: 'block_user',
                username: currentUser,
                target: username
            }));
            
            document.getElementById('blockUsername').value = '';
        }

        function unblockUser(username) {
            socket.send(JSON.stringify({
                type: 'unblock_user',
                username: currentUser,
                target: username
            }));
        }

        // ==============================================
        // ФАЙЛЫ
        // ==============================================
        document.getElementById('fileInput')?.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const preview = document.getElementById('filePreview');
            preview.innerHTML = `
                <i class="fas fa-file"></i>
                <p><strong>${file.name}</strong></p>
                <p>${(file.size / 1024).toFixed(2)} KB</p>
            `;
            
            document.getElementById('sendFileBtn').disabled = false;
        });

        function sendFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file || !currentChat) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64 = e.target.result.split(',')[1];
                
                socket.send(JSON.stringify({
                    type: 'send_file',
                    from: currentUser,
                    to: currentChat,
                    fileName: file.name,
                    fileData: base64,
                    fileType: file.type,
                    time: new Date().toLocaleTimeString()
                }));
                
                closeAllModals();
            };
            reader.readAsDataURL(file);
        }

        // ==============================================
        // YOUTUBE
        // ==============================================
        function shareYoutube() {
            const link = document.getElementById('youtubeLink').value.trim();
            if (!link || !currentChat) return;
            
            const videoId = extractYoutubeId(link);
            if (!videoId) return alert('Неверная ссылка');
            
            socket.send(JSON.stringify({
                type: 'share_youtube',
                from: currentUser,
                to: currentChat,
                videoId,
                title: 'YouTube Video',
                time: new Date().toLocaleTimeString()
            }));
            
            closeAllModals();
        }

        function extractYoutubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // ==============================================
        // НАВИГАЦИЯ
        // ==============================================
        function showChatPanel() {
            document.getElementById('chatsPanel').classList.add('hidden');
            document.getElementById('chatPanel').classList.remove('hidden');
        }

        function hideChatPanel() {
            document.getElementById('chatPanel').classList.add('hidden');
            document.getElementById('chatsPanel').classList.remove('hidden');
        }

        function openJoinModal() {
            openModal('joinModal');
        }

        // ==============================================
        // АВТОВХОД
        // ==============================================
        window.onload = function() {
            const savedUser = localStorage.getItem('nanogram_user');
            const savedPhone = localStorage.getItem('nanogram_phone');
            if (savedUser && savedPhone) {
                document.getElementById('loginUsername').value = savedUser;
                document.getElementById('loginPhone').value = savedPhone;
            }
        };
    </script>
</body>
</html>
